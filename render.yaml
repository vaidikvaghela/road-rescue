databases:
  - name: roadrescue-db
    databaseName: roadrescue
    user: roadrescue_user

services:
  - type: web
    name: roadrescue-web
    env: python
    buildCommand: "python -m pip install --upgrade pip wheel && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn roadrescue.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roadrescue-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11"

