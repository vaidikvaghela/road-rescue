{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — RoadRescue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      -webkit-font-smoothing: antialiased;
      background: #0d1117;
      overflow: hidden;
    }

    /* ── Liquid background canvas ─────────────────── */
    #liquid-canvas {
      position: fixed; inset: 0; z-index: 0;
      pointer-events: none; width: 100%; height: 100%;
    }

    /* ── Brand ────────────────────────────────────── */
    .brand {
      position: relative; z-index: 10;
      text-decoration: none;
      display: flex; align-items: center; gap: 4px;
      font-size: 1.5rem; font-weight: 800;
      color:var(--text); letter-spacing: -0.03em;
      margin-bottom: 2rem;
    }
    .brand span { color: #93c5fd; }

    /* ── Card ─────────────────────────────────────── */
    .auth-card {
      position: relative; z-index: 10;
      width: 100%; max-width: 440px;
      padding: 2.5rem;
      border-radius: 24px;
      /* Clean glass — NO displacement filter on the card */
      background: rgba(18, 24, 42, 0.65);
      backdrop-filter: blur(32px) saturate(140%);
      -webkit-backdrop-filter: blur(32px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-top-color:var(--muted);
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.40),
        inset 0 1px 0 rgba(255,255,255,0.40),
        inset 0 -1px 0 rgba(255,255,255,0.05);
    }

    /* Card icon */
    .card-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: rgba(37, 99, 235, 0.28);
      border: 1px solid rgba(96, 165, 250, 0.45);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin: 0 auto 1.2rem;
    }
    .card-title {
      font-size: 1.65rem; font-weight: 800; color:var(--text);
      letter-spacing: -0.03em; text-align: center; margin-bottom: 4px;
    }
    .card-sub { font-size: 0.875rem; color:var(--muted); text-align: center; }

    /* ── Form ─────────────────────────────────────── */
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block; font-size: 0.78rem; font-weight: 600;
      color:var(--muted); margin-bottom: 6px; letter-spacing: 0.01em;
    }
    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.10);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      padding: 12px 16px;
      color:var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .form-control::placeholder { color:var(--muted); }
    .form-control:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(96, 165, 250, 0.60);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.20);
    }
    .pwd-wrap { position: relative; }
    .pwd-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 1rem; color:var(--muted);
      padding: 0; line-height: 1;
    }

    /* ── Row util ─────────────────────────────────── */
    .row-between {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; font-size: 0.85rem;
    }
    .check-label {
      display: flex; align-items: center; gap: 8px;
      color:var(--muted); cursor: pointer;
    }
    .check-label input { accent-color: #3b82f6; width: 15px; height: 15px; }
    .link-sm { color: #93c5fd; text-decoration: none; font-weight: 500; font-size: 0.85rem; }
    .link-sm:hover { text-decoration: underline; }

    /* ── Buttons ──────────────────────────────────── */
    .btn-submit {
      width: 100%; padding: 13px;
      background: rgba(37, 99, 235, 0.60);
      border: 1px solid rgba(96, 165, 250, 0.45);
      border-top-color: rgba(147, 197, 253, 0.65);
      border-radius: 12px;
      color:var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.97rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 8px;
      transition: all 0.22s; box-shadow: 0 4px 20px rgba(37,99,235,0.30);
    }
    .btn-submit:hover { background: rgba(37, 99, 235, 0.80); transform: translateY(-1px); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* ── Divider ──────────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 1.4rem 0;
    }
    .divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.12); }
    .divider-text { font-size: 0.78rem; color:var(--muted); }

    /* ── Footer link ──────────────────────────────── */
    .card-footer-text {
      text-align: center; font-size: 0.875rem;
      color:var(--muted);
    }

    /* ── Alerts ───────────────────────────────────── */
    .alert {
      padding: 11px 14px; border-radius: 10px;
      font-size: 0.85rem; margin-bottom: 1rem;
      display: none; align-items: center; gap: 10px;
    }
    .alert.show { display: flex; }
    .alert-error   { background: rgba(239,68,68,0.18);  border: 1px solid rgba(252,165,165,0.28); color: #fca5a5; }
    .alert-success { background: rgba(16,185,129,0.18); border: 1px solid rgba(52,211,153,0.28);  color: #a7f3d0; }

    /* ── Spinner ──────────────────────────────────── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 17px; height: 17px; display: inline-block;
      border: 2px solid rgba(255,255,255,0.30);
      border-top-color:var(--text); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    /* ── Theme Overrides ─────────────────────────── */
    body[data-theme="light"] {
      background: #f0f4ff;
      color: #0f172a;
    }
    body[data-theme="light"] .auth-card {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(0, 0, 0, 0.12);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      color: #0f172a;
    }
    body[data-theme="light"] .brand,
    body[data-theme="light"] .card-title { color: #0f172a; }
    body[data-theme="light"] .card-sub,
    body[data-theme="light"] .form-label,
    body[data-theme="light"] .check-label,
    body[data-theme="light"] .card-footer-text,
    body[data-theme="light"] .divider-text { color: rgba(15, 23, 42, 0.6); }
    body[data-theme="light"] .form-control {
      background: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.12);
      color: #0f172a;
    }
    body[data-theme="light"] .form-control:focus {
      background: #fff;
      border-color: rgba(37, 99, 235, 0.5);
    }
    body[data-theme="light"] .divider-line { background: rgba(0, 0, 0, 0.08); }
    body[data-theme="light"] .theme-toggle {
      background: rgba(0, 0, 0, 0.08);
      border-color: rgba(0, 0, 0, 0.12);
      color: #0f172a;
    }

    .theme-toggle-wrap {
      position: fixed; top: 20px; right: 20px; z-index: 100;
    }
    .theme-toggle {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color:var(--text); display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .theme-toggle:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.2); }
  </style>
</head>
<body>

<div class="theme-toggle-wrap">
  <button class="theme-toggle" id="themeToggle">🌙</button>
</div>

<canvas id="liquid-canvas"></canvas>

<a href="/" class="brand">Road<span>Rescue</span></a>

<div class="auth-card">
  <div style="margin-bottom: 2rem;">
    <div class="card-icon">🔐</div>
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your RoadRescue account</div>
  </div>

  <div class="alert alert-error" id="alertError"><span>⚠️</span><span id="alertMsg">Invalid credentials.</span></div>
  <div class="alert alert-success" id="alertSuccess"><span>✅</span><span id="successMsg">Login successful! Redirecting…</span></div>

  <form id="loginForm">{% csrf_token %}
    <div class="form-group">
      <label class="form-label" for="loginUsername">Username or Email</label>
      <input type="text" class="form-control" id="loginUsername" placeholder="username or email" required autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label" for="loginPassword">Password</label>
      <div class="pwd-wrap">
        <input type="password" class="form-control" id="loginPassword" placeholder="Your password" required autocomplete="current-password"/>
        <button type="button" class="pwd-toggle" id="pwdToggle" onclick="togglePwd()">👁️</button>
      </div>
    </div>
    <div class="row-between">
      <label class="check-label">
        <input type="checkbox" id="rememberMe"/> Remember me
      </label>
      <a href="#" class="link-sm">Forgot password?</a>
    </div>
    <button type="submit" class="btn-submit" id="loginBtn">Sign In →</button>
  </form>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">OR</div>
    <div class="divider-line"></div>
  </div>

  <div class="card-footer-text">
    Don't have an account? <a href="/register/" class="link-sm">Create one free</a>
  </div>
</div>

<script>
  // Already logged in? Go straight to dashboard
  if (localStorage.getItem('rr_access')) window.location.replace('/dashboard/');

  const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || '';
  let pwdVisible = false;
  function togglePwd() {
    pwdVisible = !pwdVisible;
    const inp = document.getElementById('loginPassword');
    const btn = document.getElementById('pwdToggle');
    inp.type = pwdVisible ? 'text' : 'password';
    btn.textContent = pwdVisible ? '🙈' : '👁️';
  }

  // ── Theme Toggle Logic ─────────────────────────
  (function(){
    const saved = localStorage.getItem('rr_theme') || 'dark';
    if(saved === 'light') document.body.setAttribute('data-theme','light');
    const btn = document.getElementById('themeToggle');
    if(btn) {
      btn.textContent = saved === 'light' ? '☀️' : '🌙';
      btn.addEventListener('click', function(){
        const curr = document.body.getAttribute('data-theme');
        const next = curr === 'light' ? 'dark' : 'light';
        if(next === 'dark') document.body.removeAttribute('data-theme');
        else document.body.setAttribute('data-theme', 'light');
        localStorage.setItem('rr_theme', next);
        btn.textContent = next === 'light' ? '☀️' : '🌙';
      });
    }
  })();

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errBox = document.getElementById('alertError');
    const sucBox = document.getElementById('alertSuccess');
    errBox.classList.remove('show');
    sucBox.classList.remove('show');
    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    btn.disabled = true;
    try {
      const res = await fetch('/api/v1/auth/login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
        body: JSON.stringify({
          username: document.getElementById('loginUsername').value.trim(),
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('rr_access',  data.access);
        localStorage.setItem('rr_refresh', data.refresh);
        localStorage.setItem('rr_user', JSON.stringify(data.user || {}));
        document.getElementById('successMsg').textContent = 'Login successful! Redirecting…';
        sucBox.classList.add('show');
        setTimeout(() => window.location.href = '/dashboard/', 1000);
      } else {
        document.getElementById('alertMsg').textContent =
          data.detail || data.non_field_errors?.[0] || 'Invalid email or password.';
        errBox.classList.add('show');
        btn.innerHTML = 'Sign In →';
        btn.disabled = false;
      }
    } catch {
      document.getElementById('alertMsg').textContent = 'Network error. Check your connection.';
      errBox.classList.add('show');
      btn.innerHTML = 'Sign In →';
      btn.disabled = false;
    }
  });

  /* ── Liquid background (no filter on DOM elements) ── */
  (function () {
    const canvas = document.getElementById('liquid-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize(); window.addEventListener('resize', resize);

    const mouse = { x: W / 2, y: H / 2 };
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    const PALETTE = [[99,102,241],[59,130,246],[16,185,129],[139,92,246],[6,182,212]];
    class Blob {
      constructor(i) {
        this.i = i; this.r = Math.min(W, H) * (0.22 + Math.random() * 0.18);
        this.color = PALETTE[i % PALETTE.length];
        this.angle = (i / 5) * Math.PI * 2;
        this.orbitR = Math.min(W, H) * (0.16 + Math.random() * 0.14);
        this.x = W/2 + Math.cos(this.angle)*this.orbitR;
        this.y = H/2 + Math.sin(this.angle)*this.orbitR;
        this.vx = 0; this.vy = 0;
        this.mPhase = Math.random() * Math.PI * 2;
        this.spd = 0.5 + Math.random() * 0.8;
      }
      update(t) {
        this.angle += 0.00045 * this.spd;
        const tx = W/2 + Math.cos(this.angle)*this.orbitR;
        const ty = H/2 + Math.sin(this.angle)*this.orbitR;
        const dx = this.x - mouse.x, dy = this.y - mouse.y;
        const d = Math.sqrt(dx*dx+dy*dy)||1;
        if (d < 200) { const f=(200-d)/200*0.06; this.vx+=(dx/d)*f*this.r*0.4; this.vy+=(dy/d)*f*this.r*0.4; }
        this.vx += (tx-this.x)*0.014; this.vy += (ty-this.y)*0.014;
        this.vx *= 0.88; this.vy *= 0.88;
        this.x += this.vx; this.y += this.vy;
        this.mPhase += 0.0009 * this.spd;
      }
      draw(t) {
        const [r,g,b] = this.color;
        const pts = 10;
        ctx.beginPath();
        for (let i = 0; i <= pts; i++) {
          const a = (i/pts)*Math.PI*2;
          const w = Math.sin(a*2+this.mPhase)*0.35*this.r*0.42 + Math.sin(a*3+this.mPhase*0.8)*0.35*this.r*0.22;
          const rad = this.r + w;
          const px = this.x+Math.cos(a)*rad, py = this.y+Math.sin(a)*rad;
          i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
        }
        ctx.closePath();
        const g2 = ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*1.2);
        g2.addColorStop(0, `rgba(${r},${g},${b},0.70)`);
        g2.addColorStop(1, `rgba(${r},${g},${b},0)`);
        ctx.fillStyle = g2; ctx.fill();
      }
    }
    const blobs = Array.from({length:5}, (_,i) => new Blob(i));
    function loop(t) {
      ctx.clearRect(0,0,W,H);
      ctx.save(); ctx.filter='blur(65px)';
      blobs.forEach(b => { b.update(t); b.draw(t); });
      ctx.restore();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
</script>
</body>
</html>
